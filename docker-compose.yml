version: "3.8"
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "Your_password123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P Your_password123 -Q 'SELECT 1'",
        ]
    volumes:
      - sql_data:/var/opt/mssql

  userservice:
    build:
      context: ./UserService
    depends_on:
      - sqlserver
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=MyAppDb;User Id=sa;Password=Your_password123;
      - FRONTEND_URL=http://localhost:3000
    ports:
      - "5000:80"

volumes:
  sql_data:
